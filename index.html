.bundle-wu .field-input{margin-bottom:0}
.bundle-add-item{display:inline-flex;align-items:center;gap:5px;margin-top:2px;font-size:13px;font-weight:800;color:var(--green-deep);background:var(--green-soft);border-radius:10px;padding:8px 12px}
.bundle-sheet-note{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:12.5px;font-weight:700;color:var(--green-deep);background:var(--green-soft);border-radius:11px;padding:10px 12px}
.bundle-limit-note{display:flex;align-items:center;gap:6px;margin:0 16px 10px;font-size:12.5px;font-weight:800;color:var(--gold-deep);background:#fff7ea;border:1px solid var(--gold);border-radius:11px;padding:10px 12px}
.app-root[data-theme=dark] .bundle-limit-note{background:#2c2418}
/* registration redesign: compact name grid + tighter spacing */
.reg-hint{font-size:12.5px;font-weight:800;color:var(--green-deep);text-align:center;margin:0;line-height:1.5}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.name-grid .field-input{margin:0;width:100%}
.field-input.invalid{border-color:var(--danger)}
.name-err{color:var(--danger);font-size:11.5px;font-weight:800;text-align:center;margin:0;line-height:1.4}
.country-field{padding:10px 14px;margin-bottom:12px}
</style>

التطبيق» أو «مجموعة لوزي») وبين أي شخص يقوم باستخدام التطبيق أو التسجيل فيه (المشار إليه بـ «المستخدم» سواء كان عميلاً، تاجر تجزئة، تاجر جملة، أو مزارعاً).","استخدامك للتطبيق أو تسجيلك فيه يعني موافقتك الكاملة والخالية من الجهالة على هذه الشروط، وإذا كنت لا توافق عليها، يرجى عدم استخدام التطبيق."],sections:[{n:"1",h:"شروط عامة ونطاق الخدمة",items:[{lead:"النطاق الجغرافي:",b:"يقدم تطبيق «لوزي» خدماته حالياً داخل النطاق الجغرافي لـ «العاصمة صنعاء» فقط. ولا يتحمل التطبيق مسؤولية أي طلبات أو شحنات خارج هذا النطاق."},{lead:"آلية الدفع:",b:"وسيلة الدفع المعتمدة في التطبيق لخدمات التجزئة والتوفير هي الدفع عند الاستلام نقداً (COD) فقط."},{lead:"التعديل والتحديث:",b:"تحتفظ إدارة التطبيق بالحق المطلق في تعديل أو تحديث هذه الشروط والأحكام في أي وقت، وتصبح التعديلات سارية وفورية بمجرد نشرها على التطبيق."}]},{n:"2",h:"أحكام وشروط خاصة بالعملاء (المشترين)",items:[{lead:"دقة البيانات ومسؤوليتها:",b:"يلتزم العميل بتقديم معلومات صحيحة ودقيقة عند التسجيل (رقم الهاتف للتفعيل عبر واتساب، والموقع الجغرافي الدقيق عبر GPS)، ويتحمل العميل وحده مسؤولية أي خطأ في العناوين ينتج عنه تأخر أو إلغاء الطلب."},{lead:"سياسة الطلبات المتعددة:",b:"نظراً لأن لكل متجر سلة مستقلة، فإن اختيار منتجات من متاجر متعددة سينتج عنه إنشاء طلبات منفصلة تلقائياً، ويتحمل العميل رسوم التوصيل الخاصة بكل متجر على حدة."},{lead:"إلغاء الطلب:",b:"يحق للعميل إلغاء الطلب فقط قبل البدء في مرحلة التجهيز من قبل المتجر أو الإدارة. بمجرد تحول حالة الطلب في النظام إلى «قيد التجهيز» أو «قيد التوصيل»، لا يمكن إلغاؤه بأي حال من الأحوال."},{tag:"🔄",lead:"سياسة الإرجاع (خلال 24 ساعة):",b:"يحق للعميل طلب إرجاع مشترياته خلال 24 ساعة فقط من وقت استلام الطلب، وذلك في حال كانت البضاعة تالفة، أو ناقصة الوزن الصافي، أو مختلفة تماماً عن الصور والمواصفات المعروضة في التطبيق. ولا يحق له المطالبة بالإرجاع أو استرداد الأموال نهائياً بعد مرور 24 ساعة على الاستلام."},{tag:"🚨",lead:"شرط الحظر الصارم وعقوبة التلاعب:",b:"يُحظر تماماً على العميل إغلاق هاتفه، أو تجاهل اتصالات مندوب التوصيل عمداً عند وصول الطلب لموقعه. وفي حال تكرار هذا التصرف لأكثر من مرتين، سيتم حظر حساب العميل نهائياً وبشكل تلقائي من المنصة."},{tag:"🌰",lead:"إرجاع اللوز ال«شحطي» غير المُفصح عنه:",b:"يُتاح للعميل حق إرجاع منتج اللوز في حال تبيّن أنه من نوع (شحطي) ولم يتم الإفصاح عن ذلك صراحةً وواضحاً ضمن اسم المنتج أو وصفه عند العرض. وفي حال تم الإفصاح عن ذلك بشكل واضح، يُعدّ العميل على علم مسبق بذلك ولا يحق له المطالبة بالإرجاع لهذا السبب. وفي حال ثبت أن الخطأ ناتج عن المزارع (عدم الإفصاح أو إدخال وصف غير صحيح)، فإن المزارع يتحمل تكاليف التوصيل."},{lead:"التقييمات:",b:"يلتزم العميل بكتابة تقييمات صادقة وواقعية للمتاجر والمزارعين. يحظر استخدام الألفاظ النابية أو المسيئة، وللإدارة الحق الكامل في حذف أي تقييم يخالف ذلك دون الرجوع للعميل."}]},{n:"3",h:"أحكام وشروط خاصة بمتاجر التجزئة وجملة المكسرات (التجار)",items:[{tag:"🏅",lead:"خيارات منح «شارة التوثيق»:",b:"لإضفاء الطابع الرسمي وحماية المنصة من الكيانات الوهمية، تتيح إدارة التطبيق لتاجر التجزئة وتاجر الجملة خيارين مستقلين للحصول على «شارة التوثيق» داخل التطبيق:"},{sub:!0,lead:"الخيار الأول (التوثيق المستندي):",b:"قيام التاجر برفع صورة واضحة وصالحة من ترخيص المحل الرسمي، أو سجله التجاري، أو بطاقة عضويته في الغرفة التجارية والصناعية بصنعاء عبر النظام."},{sub:!0,lead:"الخيار الثاني (التوثيق الميداني):",b:"في حال عدم توفر الأوراق الرسمية، يطلب التاجر «نزولاً ميدانياً»، وتتولى إدارة التطبيق إرسال مندوب لمعاينة المحل على الطبيعة والتحقق من جودة ومطابقة معروضاته للمقاييس المطلوبة قبل تفعيل الشارة."},{lead:"صلاحيات النشر وحظر التعدي:",b:"يُسمح للمتجر بنشر منتجات المكسرات داخل صفحته الخاصة فقط. يُمنع منعاً باتاً على المتاجر النشر في أقسام «اللوز البلدي» أو «الزبيب» المخصصة حصرياً للمزارعين، ويحق للإدارة حذف أي منشور مخالف فوراً."},{lead:"الالتزام بالأسعار والعروض:",b:"يتعهد المتجر بتقديم أسعار حقيقية ومحدثة، وفي حال إنشاء «عروض مخفضة»، يجب إرسالها للإدارة مسبقاً للموافقة عليها للتأكد من جديتها."},{tag:"🛵",lead:"حصرية اختيار الموصل وإخلاء المسؤولية المطلقة:",b:"يقر ويلتزم متجر التجزئة التزاماً قاطعاً بأن اختيار، وتعيين، والتعاقد مع مناديب التوصيل أو السائقين أو الناقلين هو مسؤولية حصرية ومباشرة على عاتق المتجر وحده، ولا تتدخل إدارة تطبيق «لوزي» في اختيار الموصلين بأي شكل من الأشكال. وبناءً على ذلك، فإن عملية توصيل بضائع التجزئة للعملاء تقع على مسؤولية المتجر المالية والمدنية الكاملة، ويضمن المتجر سلامة البضاعة من أي تلف، ضياع، أو نقص أثناء الطريق. وفي حال حدوث أي ضرر للبضاعة، أو وقوع أي نزاع أو خلاف مع المندوب المختار من قبل المتجر، أو ارتكاب المندوب لأي خطأ تشغيلي أو قانوني، يتحمل المتجر الخسارة والمسؤولية الكاملة بمفرده دون أدنى مسؤولية، أو التزام مالي، أو تضامن قانوني من قِبل تطبيق لوزي أو إدارته."},{tag:"🔒",lead:"قطعية تسعيرة التوصيل ومنع الابتزاز:",b:"يلتزم المتجر برمجياً وقانونياً بتسعيرة التوصيل الظاهرة والمعتمدة في التطبيق وقت تأكيد الطلب من قبل العميل. ويُحظر على مندوب التوصيل التابع للمتجر مطالبة العميل بأي مبالغ إضافية أو بقشيش أو تعديل في قيمة المشوار تحت أي مسمى (مثل بعد المسافة، الازدحام المروري، أو أزمات المشتقات النفطية). وفي حال خالف المندوب ذلك وطالب بزيادة مالية، يحق للعميل رفض استلام البضاعة فوراً، ويتحمل المتجر كلفة مشوار سائقه كاملاً ونفقة الرحلة، مع حق الإدارة في اتخاذ عقوبات تصل لحظر الحساب."},{tag:"⚠️",lead:"تحمل تكاليف التوصيل المرتجعة للعميل:",b:"يتحمل المتجر تكاليف ورسوم التوصيل بالكامل لسائقه/مندوبه في حال قام العميل بإلغاء طلبه (بعد خروج المندوب)، أو في حال تجاهل العميل اتصال المندوب، أو قام بإغلاق هاتفه وتسبب في إرجاع الطلب."},{tag:"💸",lead:"آلية الإرجاع الإلزامية وعقوبة البضاعة المخالفة:",b:"في حال قبول إدارة التطبيق لبلاغ العميل بالإرجاع خلال الـ 24 ساعة المسموحة (بسبب تلف، أو غش، أو نقص وزن البضاعة)، يلتزم المتجر مجبراً برد كامل المبلغ المالي للعميل، كما يتحمل المتجر منفرداً كلفة إرسال سائقه/مندوبه مجدداً إلى موقع العميل لاستلام البضاعة وإعادة الأموال كاش له، وذلك كإجراء تعويضي للعميل وعقوبة للمتجر على إرسال بضاعة مخالفة."},{tag:"🔒",lead:"الملكية الفكرية والأسماء التجارية:",b:"يتعهد ويضمن المتجر بأن الاسم التجاري، والشعار، والعلامة التي يرفعها على المنصة هي ملك خالص له أو يمتلك ترخيصاً قانونياً باستخدامها. ويتحمل المتجر منفرداً المسؤولية القانونية والقضائية الكاملة في حال وجود أي نزاع على الاسم أو انتحال للشخصية التجارية أو انتهاك للملكية الفكرية. وتحتفظ إدارة «لوزي» بالحق الكامل في إيقاف أو حظر أي متجر فوراً ودون أي تعويض في حال ثبت انتحاله لاسم تاجر آخر."},{tag:"🚫",lead:"حظر التهرب التجاري والبيع الخلفي:",b:"يُمنع منعاً باتاً وقاطعاً على المتاجر محاولة تحويل العملاء خارج المنصة، أو مشاركة أرقام التواصل المباشر (الواتساب أو الاتصال)، أو توزيع كروت المحلات الخاصة بهم داخل شحنات الطلبات بغرض حث العميل على الشراء الخارجي والتهرب من المنصة. وفي حال إثبات ذلك، يحق لإدارة «لوزي» فرض غرامة مالية قاسية، وسحب شارة التوثيق، وحظر حساب المتجر نهائياً."},{tag:"⚖️",lead:"شرط الوزن الصافي (Net Weight):",b:"يتعهد المتجر تعهداً قانونياً قاطعاً بأن جميع الأوزان المعروضة للمنتجات داخل التطبيق هي أوزان صافية وخالصة للمنتج الغذائي نفسه دون احتساب وزن مواد التغليف، أو الأكياس، أو الصناديق الكرتونية. ويُعد أي نقص «غشاً تجارياً وتطفيفاً» يمنح العميل حق الإرجاع الفوري، ويتحمل البائع وحده المسؤولية أمام الجهات المختصة."},{lead:"قسم تجار الجملة:",b:"هذا القسم هو ميزة خاصة وحصرية تظهر للمتاجر فقط للتزود بالبضائع، ويحظر على المتاجر تسريب أسعار الجملة أو مشاركتها مع الجمهور العادي."}]},{n:"4",h:"أحكام وشروط خاصة بالمزارعين",items:[{lead:"حصرية الأقسام:",b:"تمنح المنصة أقسام «اللوز البلدي» و«الزبيب» كحق حصري للمزارعين الحقيقيين فقط."},{lead:"شرط التواجد الجغرافي للبضاعة:",b:"يلتزم المزارع برمجياً وتشغيلياً بأن تكون البضاعة المعروضة للبيع متواجدة داخل نطاق العاصمة صنعاء عند عرضها، لضمان سرعة نقلها وتوصيلها وتفادي تكاليف الشحن الطويل بين المحافظات."},{lead:"سياسة تسعير المنتجات وحق الحذف:",b:"المزارع هو المسؤول الأول عن تحديد سعر منتجاته، ولكن تحتفظ إدارة التطبيق بالحق الكامل في تعطيل أو حذف أي منشور منتج إذا رأت الإدارة أن السعر غير منطقي أو مبالغ فيه مقارنة بأسعار السوق السائدة، مع إرسال تنبيه للمزارع."},{tag:"🌰",lead:"الإفصاح عن اللوز «الشحطي» وحق الإرجاع:",b:"يُتاح للعميل حق إرجاع منتج اللوز في حال تبيّن أنه من نوع (شحطي) ولم يتم الإفصاح عن ذلك صراحةً وواضحاً ضمن اسم المنتج أو وصفه عند العرض. وفي حال تم الإفصاح عن ذلك بشكل واضح، يُعدّ العميل على علم مسبق بذلك ولا يحق له المطالبة بالإرجاع لهذا السبب. وفي حال ثبت أن الخطأ ناتج عن المزارع (عدم الإفصاح أو إدخال وصف غير صحيح)، فإن المزارع يتحمل تكاليف التوصيل."},{tag:"⚖️",lead:"شرط الوزن الصافي والالتزام بالتسعيرة:",b:"ينطبق على المزارعين ما ينطبق على المتاجر بخصوص الالتزام بالوزن الصافي الخالص للمنتج دون التغليف، والالتزام القاطع بتسعيرة التوصيل المعتمدة في النظام وقت الطلب دون المطالبة بأي مبالغ إضافية عند باب العميل."},{tag:"🚫",lead:"حظر التهرب التجاري:",b:"يُحظر تماماً على المزارعين توزيع أرقامهم أو كروت تواصلهم مع المناديب لسرقة عملاء المنصة والبيع من خلف التطبيق، ويُعاقب المخالف بالحظر النهائي والغرامة."},{tag:"📦",lead:"التوصيل الخاص بالمزارعين وإخلاء المسؤولية:",b:"المزارع هو المسؤول الأول والأخير عن تأمين وتدبير مندوب لتوصيل بضاعته إلى العميل في صنعاء على نفقته ومسؤوليته الكاملة. وفي حال تعذر على المزارع ذلك، وتدخلت إدارة «لوزي» لتوفير مندوب من طرفها كخدمة تسهيلية، فإن هذا المندوب يُعد وكيلاً عن المزارع في هذه الرحلة. وتخلي إدارة «لوزي» مسؤوليتها القانونية والمالية التامة عن أي تلف، نقص، ضياع للبضاعة أو الكاش أثناء الطريق، كما يتحمل المزارع وحده كلفة المشوار المرتجع وإعادة الأموال للعميل إذا تبين أن بضاعته تالفة أو مخالفة خلال الـ 24 ساعة الأولى."}]},{n:"5",h:"قسم تجار الجملة وإخلاء المسؤولية التامة",items:[{lead:"نطاق الخدمة:",b:"يقتصر دور قسم «تجار الجملة» (المخفي عن الجمهور) على عرض أسعار الجملة وربط المتاجر بتجار الجملة لإتمام الطلب فيما بينهم فقط، بمثابة لوحة معلومات وعرض، دون أي تدخل من المنصة في النقل أو الشحن أو التحصيل."},{tag:"🚚",lead:"حظر التدخل ومسؤولية الناقل الكاملة:",b:"يقر ويلتزم تاجر الجملة والمحل المشتري بأن إدارة تطبيق «لوزي» لا تتدخل بأي شكل من الأشكال في عمليات نقل، أو شحن، أو تنسيق طلبات الجملة. ويعد اختيار الموصل، أو السائق، أو جهة النقل والناقل مسؤولية حصرية وكاملة ومباشرة على عاتق تجار الجملة والمحلات (خارج نطاق المنصة التقنية). وبناءً عليه، يقع عبء وتكاليف ومخاطر الشحن والتوصيل، وضمان سلامة البضاعة من أي تلف، أو نقص، أو ضياع أثناء الطريق على عاتق أطراف عملية النقل المختارين من قِبلهم، دون أدنى مسؤولية أو تبعة تضامنية على التطبيق."},{tag:"🔒",lead:"الحماية من الاحتيال وتبرئة الذمة من المندوبين الوهميين:",b:"تخلي إدارة تطبيق «لوزي» مسؤوليتها القانونية والمالية التامة والمطلقة في حال تعرض تاجر الجملة لأي عملية تلاعب أو احتيال. وإذا تقدم إلى تاجر الجملة أي سائق، أو مندوب توصيل، أو أي شخص يدّعي أو يزعم زوراً أنه مرسل من قِبل إدارة تطبيق «لوزي» أو «مجموعة لوزي»، وقام بطلب بضائع، أو سحب أموال، أو طلب مبالغ مالية تحت أي مسمى؛ فإن إدارة التطبيق لا تتحمل أدنى مسؤولية عن تصرفاته. ويتحمل تاجر الجملة وحده كامل المسؤولية المدنية والجنائية الناتجة عن تسليم أمواله أو بضائعه لأي شخص دون التحقق الرسمي والاتصال المباشر بإدارة المنصة لاعتماد الهوية، ويُعد تسليمه للبضائع أو الكاش تقصيراً منه يسقط معه حقه في أي مطالبة مستقبلية."},{tag:"❌",lead:"إخلاء المسؤولية المالية للجملة والديون:",b:"لا يحق لتاجر الجملة نهائياً مطالبة «مجموعة لوزي» بقيمة أي بضاعة تم توصيلها لأحد المتاجر ولم يقم المتجر بدفع ثمنها، سواء كان ذلك بسبب إهمال مندوب التوصيل التابع لتاجر الجملة في تحصيل المبلغ، أو بسبب امتناع المتجر عن السداد أو أي سبب آخر. العلاقة المالية والتحصيل والديون هي مسؤولية مباشرة وحصرية بين تاجر الجملة والمتجر المشتري خارج نطاق المنصة."}]},{n:"6",h:"قسم التوفير والاشتراكات (الملكية الفكرية والحماية التجارية)",items:[{lead:"ملكية القسم:",b:"«قسم التوفير» هو قسم تجاري وحصري مملوك بالكامل لإدارة تطبيق «لوزي» (مجموعة لوزي)، ولا يحق لأي متجر أو مزارع خارجي عرض منتجاته فيه."},{lead:"رسوم الاشتراك والتفعيل:",b:"قيمة الاشتراك السنوي في قسم التوفير هي 500 ريال يمني سنوياً (أو ما يعادلها بحسب ما تحدده الإدارة). يتم تفعيل الاشتراك يدوياً بعد قيام العميل برفع صورة واضحة لسند دفع الرسوم المعتمد."},{tag:"🚫",lead:"حظر الاستغلال التجاري وقيد الكميات:",b:"منتجات قسم التوفير مخصصة للاستهلاك الشخصي والمنزلي للعملاء الحقيقيين فقط. ويُمنع منعاً باتاً استخدام القسم لأغراض تجارية، أو إعادة البيع، أو تصريف البضائع للمحلات. وتحتفظ إدارة «لوزي» بالحق المطلق في تحديد حد أقصى للكميات المتاحة للشراء لكل عميل برمجياً، كما يحق للإدارة إلغاء أي طلبية وإيقاف وحظر حساب المشتري نهائياً ودون رد رسوم الاشتراك إذا تبين أنه «تاجر» أو يقوم بشراء الكميات بغرض إعادة البيع والمنافسة غير المشروعة."},{lead:"انتهاء الاشتراك:",b:"عند انتهاء مدة الاشتراك السنوي، يحق للتطبيق حجب ميزة الشراء والوصول لقسم التوفير فوراً، وتظل الأسعار المخفضة ظاهرة فقط كعرض تشجيعي للمستخدم حتى يقوم بالتجديد."}]},{n:"7",h:"نظام البلاغات والقرارات الإدارية القاطعة",items:[{lead:"آلية بلاغات الإرجاع وشكاوى الجودة:",b:"لتقديم طلب إرجاع خلال الـ 24 ساعة المسموحة، يجب على العميل رفع بلاغ رسمي موجه للإدارة عبر التطبيق، يلتزم فيه بـ: رفع صور واضحة وقاطعة تثبت تلف البضاعة أو نقص وزنها أو اختلافها، وكتابة وصف تفصيلي للمشكلة، وتحديد اسم المتجر أو المزارع المشترى منه."},{lead:"السرية والاطلاع:",b:"يُرسل البلاغ للإدارة وللمتجر معاً بشكل سري ولا يظهر للعامة. يرى المتجر البلاغ بالكامل وتفاصيله لمراجعة جودة عمله، لكن لا يمكنه الرد عليه أو حذفه داخل التطبيق."},{lead:"القرار النهائي الصارم:",b:"لإدارة التطبيق الصلاحية المطلقة والكاملة في اتخاذ القرار النهائي بشأن قبول طلب الإرجاع أو رفضه، أو التعامل مع أي مخالفة للشروط (بما يشمل إيقاف وحظر حسابات المتاجر، المزارعين، أو العملاء). جميع قرارات الإدارة نهائية وقاطعة ولا تقبل الاستئناف، أو المراجعة، أو الطعن بأي شكل من الأشكال قضائياً أو إدارياً."}]},{n:"8",h:"مرجعية الغرفة التجارية والتحكيم",items:[{tag:"⚖️",lead:"الغرفة التجارية كجهة تحكيم حصرية:",b:"في حال حدوث أي نزاع تجاري أو قانوني بين المتجر (تجزئة أو جملة) أو المزارع وبين إدارة التطبيق، ويتعذر حله ودياً، يتعهد الطرفان التزاماً قاطعاً وقبل اللجوء إلى القضاء والجهات الحكومية بإحالة النزاع رسمياً إلى «مركز التحكيم في الغرفة التجارية والصناعية بصنعاء» للفصل فيه وفقاً لأعراف سوق المكسرات واللوز والزبيب المعتمدة في أمانة العاصمة. وتظل كافة قرارات إدارة «لوزي» الإدارية (من حظر حسابات، أو إلغاء توثيق، أو حذف منتجات) سارية ونافذة وفورية طوال فترة التحكيم وحتى صدور قرار رسمي من الغرفة."}]},{n:"9",h:"مطابقة الصور للواقع وحظر التضليل البصري (ضمان الجودة)",items:[{tag:"📸",lead:"شرط حقيقية ومطابقة الصور:",b:"يتعهد ويقر المتجر والمزارع التزاماً قاطعاً بأن جميع الصور والوسائط المرئية المرفوعة للمنتجات داخل التطبيق هي صور حقيقية ومطابقة بنسبة 100% للمنتج الفعلي الذي سيتم شحنه وتوصيله للعميل من حيث: (النوع، المنشأ كاللوز البلدي أو الخارجي، الحجم، اللون، ودرجة الجودة ونظافة المنتج). ويُحظر تماماً استخدام صور عامة من الإنترنت أو صور مضللة تفوق جودة المنتج الحقيقي المعروض."},{tag:"🚨",lead:"عقوبة الغش والتضليل البصري:",b:"في حال تبين لإدارة التطبيق (بناءً على بلاغ مصور من العميل ومقارنته بالصورة المعروضة في المنصة) أن المنتج المرسل أقل جودة، أو مختلف النوع والمنشأ، أو مجرد تضليل بصري؛ يُصنف هذا التصرف قانونياً وتشغيلياً كـ «تزوير وغش تجاري معتمد»."},{lead:"التبعات القانونية والإدارية:",b:"يمنح هذا المخالفُ العميلَ الحقَ المطلق في رفض الاستلام أو إرجاع البضاعة واسترداد ماله كاملاً كاش، ويتحمل البائع وحده كلفة مشوار المندوب ذهاباً وإياباً. وتحتفظ إدارة «لوزي» بالحق الكامل والفوري في شطب المنتج المخالف، وفرض غرامة مالية على الحساب، وفي حال التكرار يتم حظر حساب المتجر أو المزارع نهائياً من المنصة مع إخلاء مسؤولية التطبيق أمام جهات الرقابة وحماية المستهلك."}]},{n:"10",h:"سلامة التخزين وجودة المذاق",items:[{tag:"🛡️",lead:"تعهد جودة المنتج وطزاجته:",b:"يتعهد المتجر والمزارع بأن جميع المنتجات المعروضة هي بضائع طازجة، سليمة، وخالية تماماً من الرطوبة، أو السوس، أو طعم «الزرنخة» الناتج عن سوء أو طول فترة التخزين."},{lead:"حق الإرجاع عند ظهور العيب:",b:"إذا تبين للعميل بعد فتح المنتج وتذوقه خلال الـ 24 ساعة الأولى وجود هذا العيب، يُعتبر المنتج تالفاً، ويحق للعميل إرجاعه فوراً واستعادة ماله، ويتحمل البائع المسؤولية الكاملة عن تعويض العميل وتكاليف المندوب، مع حق الإدارة في إنذار البائع أو حظره."}]},{n:"11",h:"حظر التنازل عن الحساب أو التصرف به",items:[{tag:"🪪",lead:"حصرية ملكية الحساب الموثق:",b:"تعتبر حسابات المتاجر والمزارعين في تطبيق «لوزي»، وبخاصة الحسابات الموثقة، حسابات شخصية وحصرية لأصحابها القانونيين الذين تم التحقق منهم مستندياً أو ميدانياً."},{lead:"حظر البيع أو النقل دون موافقة:",b:"يُمنع منعاً باتاً وقاطعاً بيع الحساب، أو تأجيره، أو التنازل عنه، أو نقل ملكيته للغير دون أخذ موافقة خطية مسبقة من إدارة التطبيق. وفي حال اكتشاف أي عملية نقل ملكية أو تصرف بالحساب من وراء الإدارة، يحق لإدارة «لوزي» سحب شارة التوثيق فوراً، وحظر الحساب نهائياً، مع تحميل صاحب الحساب الأصلي كافة التبعات القانونية والتجارية لأي عمليات غش أو احتيال تتم عبر حسابه."}]},{n:"12",h:"الحصانة القانونية وإخلاء المسؤولية المطلقة لـ «لوزي»",items:[{tag:"⚠️",lead:"المسؤولية الجنائية والطبية عن سلامة المنتجات:",b:"إن المواد المعروضة هي مواد غذائية تخضع لرقابة بائعيها. يضمن المتجر والمزارع بشكل مطلق وصارم سلامة بضائعهما صحياً وخلوها من التلف، التعفن، أو المواد المغشوشة وفقاً للقوانين النافذة والمقاييس الرسمية. ويتحملان منفردين وبشكل كامل ومباشر أي مسؤولية جنائية، مدنية، أو تعويضات طبية وعلاجية أمام القضاء والنيابة والجهات الحكومية في حال حدوث تسمم أو ضرر صحي لأي مستخدم، دون أدنى مسؤولية أو تضامن أو تبعية قانونية على تطبيق «لوزي» أو إدارته."},{b:"تطبيق «لوزي» هو منصة تقنية وسيطة تربط بين المتاجر والمزارعين والعملاء لتسهيل البيع والتجزئة. وبالتالي، لا يتحمل التطبيق المسؤولية القانونية المباشرة عن جودة البضائع التي توفرها المتاجر الخارجية، وينحصر دور التطبيق في الإجراءات التأديبية الإدارية (مثل إلزام المتجر بالإرجاع، أو حظر الحساب، أو إلغاء التوثيق) في حال ثبوت المخالفة خلال الـ 24 ساعة الأولى."},{tag:"🔒",lead:"أمن البيانات والخصوصية الرقمية:",b:"تلتزم إدارة تطبيق «لوزي» ببذل أقصى الجهود الممكنة لتأمين وحماية بيانات المستخدمين (أرقام الهواتف، سجلات البيع، المواقع الجغرافية GPS) والوقوف على أحدث معايير الحماية البرمجية. ومع ذلك، فإن المستخدم يقر بأن شبكة الإنترنت والأنظمة الرقمية ليست آمنة بنسبة 100%، ويوافق على رفع بياناته وموقعه على مسؤوليته الخاصة. وتخلي إدارة التطبيق مسؤوليتها القانونية أو المدنية عن أي اختراق سيبراني، أو تسريب بيانات ناتج عن قوى قاهرة، أو هجمات إلكترونية مستهدفة خارجة عن السيطرة البرمجية المعتادة."},{b:"لا يتحمل التطبيق مسؤولية أي تأخير في التوصيل أو تراجع الأداء ناتج عن ظروف قاهرة، أو أزمات مشتقات نفطية، أو قطوعات شوارع، أو اضطرابات أمنية خارجة عن إرادة مناديب المتاجر والمزارعين."}]},{n:"13",h:"نظام عمولة المنصة (محفظة البائع) وآلية التعديل المستقبلي",items:[{tag:"📊",lead:"النسبة الثابتة لعمولة التجزئة والجملة:",b:"يقر ويلتزم كل متجر (تجزئة أو جملة) ومزارع مسجل في التطبيق بدفع عمولة اقتطاعية ثابتة لصالح إدارة تطبيق «لوزي» عن كل صفقة بيع يتم إتمامها بنجاح وتحويل حالتها إلى «مكتمل»، وتُحتسب النسب كالتالي:"},{sub:!0,lead:"مبيعات التجزئة:",b:"نسبة ثابتة وقدرها 0.005% من إجمالي قيمة الطلب المكتمل."},{sub:!0,lead:"مبيعات الجملة:",b:"نسبة ثابتة وقدرها 0.001% من إجمالي قيمة صفقة الجملة المكتملة."},{tag:"🔒",lead:"التسجيل الآلي والدين المستحق:",b:"تُقيد هذه العمولات تلقائياً في ذمة البائع عبر «نظام محفظة البائع» داخل لوحة التحكم بمجرد تسليم الطلب للعميل، وتعتبر ديناً مستحق الأداء لصالح المنصة يجب تصفيتها وتوريدها بانتظام لتجنب تعليق الحساب."},{tag:"✅",lead:"استثناء الطلبات المدفوعة مسبقاً:",b:"الطلبات التي يتم سدادها من العميل عبر خيار «الدفع المسبق» (التحويل البنكي) ويتم اعتماد تحويلها لا تُحتسب على البائع كعمولة آجلة في محفظته، إذ تُسوّى عمولتها مباشرةً من قِبل إدارة المنصة عند تحصيل قيمة الطلب، فلا يترتب على البائع أي دين مؤجل عنها."}]}]};function TermsSheet({t,lang,onClose}){return React.createElement("div",{className:"modal-overlay",onClick:onClose},React.createElement("div",{className:"sheet",onClick:e=>e.stopPropagation()},React.createElement("div",{className:"sheet-handle"}),React.createElement("div",{className:"terms-top"},React.createElement("h2",null,t.terms_title),React.createElement("span",{className:"terms-sub-tag"},React.createElement(Icon,{name:"location",size:12,color:"var(--green-deep)"}),lang==="ar"?"العاصمة صنعاء":"Sanaa")),React.createElement("div",{className:"sheet-scroll terms-scroll"},TERMS_AR.intro.map((p,i)=>React.createElement("p",{key:"in"+i,className:"terms-intro"},p)),TERMS_AR.sections.map(s=>React.createElement("div",{key:s.n,className:"terms-block"},React.createElement("div",{className:"terms-head"},React.createElement("span",{className:"terms-num"},s.n),React.createElement("h4",null,s.h)),React.createElement("div",{className:"terms-items"},s.items.map((it,j)=>React.createElement("div",{key:j,className:`terms-item ${it.sub?"sub":""}`},it.tag?React.createElement("span",{className:"terms-emoji"},it.tag):React.createElement("span",{className:"terms-bullet"}),React.createElement("p",null,it.lead&&React.createElement("b",null,it.lead," "),it.b))))))),Rea       ".lzc-x{background:rgba(255,255,255,.16);border:none;color:#fff;width:32px;height:32px;border-radius:10px;font-size:18px;cursor:pointer;}",
      ".lzc-tabs{display:flex;gap:6px;padding:12px 14px 0;flex-wrap:wrap;}",
      ".lzc-tabs button{flex:1;min-width:74px;border:1px solid #e3e9e3;background:#f7f9f7;color:#4a5a50;font-family:inherit;font-size:12.5px;font-weight:800;padding:9px 6px;border-radius:10px;cursor:pointer;}",
      ".lzc-tabs button.on{background:#2F5E3E;color:#fff;border-color:#2F5E3E;}",
      ".lzc-bd{padding:14px 16px 22px;}",
      ".lzc-track{border:1px solid #eef1ee;border-radius:16px;padding:15px 16px;margin-bottom:12px;}",
      ".lzc-th{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}",
      ".lzc-th .nm{font-weight:900;font-size:15px;display:flex;align-items:center;gap:8px;}",
      ".lzc-dot{width:11px;height:11px;border-radius:50%;}",
      ".lzc-r .lzc-dot{background:#2F5E3E;}.lzc-w .lzc-dot{background:#C08A43;}",
      ".lzc-bdg{font-size:12.5px;font-weight:900;padding:5px 11px;border-radius:20px;}",
      ".lzc-r .lzc-bdg{background:#eef5f0;color:#234a30;}.lzc-w .lzc-bdg{background:#fbf3e4;color:#9a6a25;}",
      ".lzc-rate{display:flex;align-items:baseline;gap:7px;margin-bottom:11px;}",
      ".lzc-rate b{font-size:25px;font-weight:900;}.lzc-rate span{font-size:12px;color:var(--mut);font-weight:700;}",
      ".lzc-bar{height:11px;border-radius:30px;background:#edf1ed;overflow:hidden;}",
      ".lzc-bar i{display:block;height:100%;border-radius:30px;}",
      ".lzc-r .lzc-bar i{background:linear-gradient(90deg,#3f7a52,#2F5E3E);}.lzc-w .lzc-bar i{background:linear-gradient(90deg,#d6a866,#C08A43);}",
      ".lzc-meta{display:flex;justify-content:space-between;margin-top:9px;font-size:12.5px;font-weight:800;}",
      ".lzc-r .lzc-meta .nx{color:#234a30;}.lzc-w .lzc-meta .nx{color:#9a6a25;}",
      ".lzc-meta .tt{color:var(--mut);direction:ltr;}",
      ".lzc-max{display:flex;align-items:center;gap:9px;background:#fbf3e4;border:1px solid #ecd9b8;border-radius:11px;padding:11px 13px;font-size:13px;font-weight:900;color:#9a6a25;}",
      ".lzc-foot{background:#eef5f0;border:1px solid #cfe2d6;border-radius:12px;padding:11px;text-align:center;font-size:12.5px;font-weight:700;color:#234a30;}",
      ".lzc-seg{display:flex;background:#f0f3f0;border-radius:12px;padding:5px;gap:5px;margin-bottom:16px;}",
      ".lzc-seg button{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:800;color:var(--mut);padding:9px;border-radius:9px;cursor:pointer;}",
      ".lzc-seg button.on{background:#fff;color:#234a30;box-shadow:0 2px 6px rgba(35,74,48,.1);}",
      ".lzc-fld{display:block;font-size:13px;font-weight:800;color:var(--mut);margin-bottom:7px;}",
      ".lzc-inp{position:relative;margin-bottom:14px;}",
      ".lzc-inp input{width:100%;font-family:inherit;font-size:23px;font-weight:900;color:var(--ink);padding:14px 16px 14px 52px;border:2px solid #e3e9e3;border-radius:13px;outline:none;direction:ltr;text-align:left;}",
      ".lzc-inp .cur{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:800;color:var(--mut);}",
      ".lzc-tag{display:flex;align-items:center;justify-content:space-between;background:#eef5f0;border:1px solid #cfe2d6;border-radius:12px;padding:12px 15px;margin-bottom:13px;font-weight:900;color:#234a30;}",
      ".lzc-tag.w{background:#fbf3e4;border-color:#ecd9b8;color:#9a6a25;}",
      ".lzc-res{border:1px solid #eef1ee;border-radius:14px;overflow:hidden;}",
      ".lzc-row{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;font-size:14.5px;}",
      ".lzc-row .k{color:var(--mut);font-weight:700;}.lzc-row .v{font-weight:900;direction:ltr;}",
      ".lzc-row.c{background:#fbf3e4;border-block:1px solid #ecd9b8;}.lzc-row.c .v{color:var(--red);}",
      ".lzc-row.n{background:#2F5E3E;color:#fff;}.lzc-row.n .k{color:#fff;font-weight:900;}.lzc-row.n .v{font-size:19px;}",
      ".lzc-save{margin-top:13px;background:linear-gradient(135deg,#fbf3e4,#fff);border:1px dashed #C08A43;border-radius:13px;padding:13px 15px;font-size:13px;font-weight:700;color:#7a5a22;line-height:1.6;}",
      ".lzc-save b{color:#9a6a25;font-weight:900;}",
      ".lzc-tbl{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:16px;border:1px solid #cfe2d6;border-radius:12px;overflow:hidden;}",
      ".lzc-tbl th{background:#2F5E3E;color:#fff;font-weight:800;padding:10px 6px;}",
      ".lzc-tbl td{padding:10px 6px;text-align:center;border-top:1px solid #e9efe9;font-weight:700;}",
      ".lzc-tbl tr:nth-child(even){background:#eef5f0;}",
      ".lzc-tbl .rng{direction:ltr;color:#2a4cc0;font-weight:800;}",
      ".lzc-secttl{font-size:14px;font-weight:900;color:#234a30;margin:4px 0 8px;}",
      ".lzc-ord{border:1px solid #eef1ee;border-radius:13px;padding:12px 14px;margin-bottom:10px;}",
      ".lzc-ord .top{display:flex;justify-content:space-between;align-items:center;font-weight:900;}",
      ".lzc-ord .amt{color:var(--red);direction:ltr;}",
      ".lzc-ord .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}",
      ".lzc-ord .chips span{font-size:11px;font-weight:800;background:#fbf3e4;border:1px solid #ecd9b8;color:#9a6a25;padding:3px 9px;border-radius:20px;}",
      ".lzc-ord .rev{margin-top:7px;font-size:12px;font-weight:800;color:var(--red);}",
      ".lzc-empty{text-align:center;color:var(--mut);font-weight:700;padding:26px 10px;}"
    ].join("\n");
    document.head.appendChild(css);
  }

  // ---------- data ----------
  function loadTiers() {
    if (STATE.tiers.length) return Promise.resolve(STATE.tiers);
    return SB.from("commission_tiers").select("*").then(function (r) { STATE.tiers = r.data || []; return STATE.tiers; });
  }
  function loadProfile() {
    return SB.auth.getUser().then(function (r) {
      var u = r && r.data && r.data.user;
      if (!u) { STATE.uid = null; STATE.profile = null; return null; }
      STATE.uid = u.id;
      return SB.from("profiles").select("name,role,retail_cumulative_sales,wholesale_cumulative_sales").eq("user_id", u.id).maybeSingle()
        .then(function (p) { STATE.profile = p.data || null; return STATE.profile; });
    });
  }
  function isSeller(p) {
    if (!p || !p.role) return false;
    var role = p.role;
    return SELLER_ROLES.some(function (x) { return role === x || role.indexOf(x) === 0; });
  }
  function primarySeg(p) {
    if (!p) return "retail";
    return Number(p.wholesale_cumulative_sales) > Number(p.retail_cumulative_sales) ? "wholesale" : "retail";
  }

  // ---------- chip ----------
  function renderChip() {
    var old = document.querySelector(".lzc-chip"); if (old) old.remove();
    if (!STATE.profile || !isSeller(STATE.profile)) return;
    var seg = primarySeg(STATE.profile);
    var cum = Number(STATE.profile[seg + "_cumulative_sales"]) || 0;
    var tr = tierOf(STATE.tiers, seg, cum);
    if (!tr) return;
    var nx = nextTier(STATE.tiers, seg, tr.level);
    var prog = nx ? Math.max(0, Math.min(100, ((cum - tr.min_sales) / (nx.min_sales - tr.min_sales)) * 100)) : 100;
    var btn = document.createElement("button");
    btn.className = "lzc-chip lzc";
    btn.style.setProperty("--p", prog.toFixed(0) + "%");
    btn.innerHTML =
      '<span class="rg"><i>' + AR(tr.level) + "</i></span>" +
      '<span class="ct"><b>مستوى ' + AR(tr.level) + "</b><s>" + SEG_AR[seg] + " · " + pct(tr.rate, seg) + "</s></span>";
    document.body.appendChild(btn);
    try {
      var saved = JSON.parse(localStorage.getItem("lzc_chip_pos") || "null");
      if (saved && typeof saved.left === "number") applyPos(btn, saved.left, saved.top);
    } catch (e) {}
    makeDraggable(btn, openSheet);
  }

  // Drag the chip anywhere; a tap (no real movement) opens the sheet. Position persists.
  function applyPos(el, left, top) {
    var w = el.offsetWidth || 150, h = el.offsetHeight || 46;
    left = Math.max(6, Math.min(window.innerWidth - w - 6, left));
    top = Math.max(6, Math.min(window.innerHeight - h - 6, top));
    el.style.left = left + "px"; el.style.top = top + "px";
    el.style.right = "auto"; el.style.bottom = "auto"; el.style.insetInlineStart = "auto";
  }
  function makeDraggable(el, onTap) {
    var sx = 0, sy = 0, ox = 0, oy = 0, moved = false, dragging = false, pid = null;
    el.style.touchAction = "none";
    el.addEventListener("pointerdown", function (e) {
      dragging = true; moved = false; pid = e.pointerId;
      var r = el.getBoundingClientRect();
      sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top;
      try { el.setPointerCapture(pid); } catch (_) {}
    });
    el.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      var dx = e.clientX - sx, dy = e.clientY - sy;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
      if (moved) applyPos(el, ox + dx, oy + dy);
    });
    function end() {
      if (!dragging) return; dragging = false;
      try { el.releasePointerCapture(pid); } catch (_) {}
      if (moved) {
        var r = el.getBoundingClientRect();
        try { localStorage.setItem("lzc_chip_pos", JSON.stringify({ left: r.left, top: r.top })); } catch (_) {}
      } else { onTap(); }
    }
    el.addEventListener("pointerup", end);
    el.addEventListener("pointercancel", end);
  }

  // ---------- sheet ----------
  function openSheet() {
    Promise.all([loadProfile(), loadTiers()]).then(function () {
      STATE.calcSeg = primarySeg(STATE.profile);
      var ov = document.createElement("div");
      ov.className = "lzc-ov lzc";
      ov.addEventListener("click", function (e) { if (e.target === ov) ov.remove(); });
      ov.innerHTML = '<div class="lzc-sheet"><div class="lzc-hd"><h3>مركز العمولة</h3><button class="lzc-x">×</button></div>' +
        '<div class="lzc-tabs"></div><div class="lzc-bd"></div></div>';
      ov.querySelector(".lzc-x").addEventListener("click", function () { ov.remove(); });
      document.body.appendChild(ov);
      buildTabs(ov); renderTab(ov);
    });
  }
  function buildTabs(ov) {
    var tabs = [["level", "مستواي"], ["calc", "احسب"], ["system", "النظام"], ["mine", "عمولاتي"]];
    var box = ov.querySelector(".lzc-tabs"); box.innerHTML = "";
    tabs.forEach(function (t) {
      var b = document.createElement("button");
      b.textContent = t[1]; if (STATE.tab === t[0]) b.className = "on";
      b.addEventListener("click", function () { STATE.tab = t[0]; buildTabs(ov); renderTab(ov); });
      box.appendChild(b);
    });
  }
  function renderTab(ov) {
    var bd = ov.querySelector(".lzc-bd");
    if (STATE.tab === "level") bd.innerHTML = viewLevel();
    else if (STATE.tab === "calc") { bd.innerHTML = viewCalc(); wireCalc(ov); }
    else if (STATE.tab === "system") bd.innerHTML = viewSystem();
    else { bd.innerHTML = '<div class="lzc-empty">جارٍ التحميل…</div>'; loadMine(ov); }
  }

  function trackHtml(seg, cum) {
    var cls = seg === "wholesale" ? "lzc-w" : "lzc-r";
    var tr = tierOf(STATE.tiers, seg, cum);
    if (!tr) return "";
    var nx = nextTier(STATE.tiers, seg, tr.level);
    var head = '<div class="lzc-track ' + cls + '"><div class="lzc-th"><div class="nm"><span class="lzc-dot"></span>' + SEG_AR[seg] +
      '</div><span class="lzc-bdg">مستوى ' + AR(tr.level) + " من ٧</span></div>" +
      '<div class="lzc-rate"><b>' + pct(tr.rate, seg) + "</b><span>عمولتك الحالية</span></div>";
    if (nx) {
      var prog = Math.max(0, Math.min(100, ((cum - tr.min_sales) / (nx.min_sales - tr.min_sales)) * 100));
      var remaining = Math.max(0, nx.min_sales - cum);
      head += '<div class="lzc-bar"><i style="width:' + prog.toFixed(0) + '%"></i></div>' +
        '<div class="lzc-meta"><span class="nx">متبقٍ ' + grp(remaining) + " ر للمستوى " + AR(nx.level) + " · عمولة " + pct(nx.rate, seg) + "</span>" +
        '<span class="tt">' + grp(cum) + " / " + grp(nx.min_sales) + "</span></div>";
    } else {
      head += '<div class="lzc-max">🏆 وصلت لأعلى مستوى — تتمتع بأقل عمولة في المنصة</div>';
    }
    return head + "</div>";
  }
  function viewLevel() {
    var p = STATE.profile || {};
    return trackHtml("retail", Number(p.retail_cumulative_sales) || 0) +
      trackHtml("wholesale", Number(p.wholesale_cumulative_sales) || 0) +
      '<div class="lzc-foot">كل ما بعت أكثر، قلّت عمولتك — والمسارَان مستقلان تماماً</div>';
  }

  function viewCalc() {
    var seg = STATE.calcSeg;
    var p = STATE.profile || {};
    var cum = Number(p[seg + "_cumulative_sales"]) || 0;
    var tr = tierOf(STATE.tiers, seg, cum);
    var amt = Number(STATE.calcAmt) || 0;
    var rate = tr ? Number(tr.rate) : 0;
    var comm = Math.round(amt * rate * 100) / 100;
    var net = Math.round((amt - comm) * 100) / 100;
    var nx = tr ? nextTier(STATE.tiers, seg, tr.level) : null;
    var save = nx ?
      '<div class="lzc-save">في المستوى التالي (عمولة ' + pct(nx.rate, seg) + ") ستدفع على نفس المبلغ عمولة أقل بـ <b>" +
      money2(Math.round(amt * (rate - nx.rate) * 100) / 100) + " ر</b>.</div>"
      : '<div class="lzc-save"><b>أنت في أعلى مستوى</b> — تتمتع بأقل عمولة ممكنة.</div>';
    return '<div class="lzc-seg"><button data-seg="retail" class="' + (seg === "retail" ? "on" : "") + '">تجزئة</button>' +
      '<button data-seg="wholesale" class="' + (seg === "wholesale" ? "on" : "") + '">جملة</button></div>' +
      '<label class="lzc-fld">قيمة البضاعة (بدون رسوم التوصيل)</label>' +
      '<div class="lzc-inp"><span class="cur">ريال</span><input id="lzc-amt" inputmode="numeric" value="' + grp(amt) + '"></div>' +
      '<div class="lzc-tag ' + (seg === "wholesale" ? "w" : "") + '"><span>مستواك الحالي: ' + (tr ? "مستوى " + AR(tr.level) + " من ٧" : "—") +
      "</span><span>" + (tr ? pct(tr.rate, seg) : "—") + "</span></div>" +
      '<div class="lzc-res"><div class="lzc-row"><span class="k">قيمة البضاعة</span><span class="v">' + money2(amt) + ' ر</span></div>' +
      '<div class="lzc-row c"><span class="k">عمولة لوزي</span><span class="v">− ' + money2(comm) + ' ر</span></div>' +
      '<div class="lzc-row n"><span class="k">صافي لك</span><span class="v">' + money2(net) + " ر</span></div></div>" + save +
      '<div class="lzc-save" style="border-style:solid;border-color:#ecd9b8;background:#f7f9f7;color:#6c7d73;margin-top:10px;">المستوى يُحدَّد من مبيعاتك التراكمية لا من مبلغ الطلب — المبلغ هنا فقط لحساب العمولة بنسبتك الحالية.</div>';
  }
  function wireCalc(ov) {
    var inp = ov.querySelector("#lzc-amt");
    if (inp) inp.addEventListener("input", function () {
      var raw = inp.value.replace(/[^0-9]/g, "");
      STATE.calcAmt = raw === "" ? 0 : Number(raw);
      var bd = ov.querySelector(".lzc-bd"); bd.innerHTML = viewCalc(); wireCalc(ov);
      var ni = ov.querySelector("#lzc-amt"); if (ni) { ni.focus(); ni.setSelectionRange(ni.value.length, ni.value.length); }
    });
    ov.querySelectorAll(".lzc-seg button").forEach(function (b) {
      b.addEventListener("click", function () { STATE.calcSeg = b.getAttribute("data-seg"); var bd = ov.querySelector(".lzc-bd"); bd.innerHTML = viewCalc(); wireCalc(ov); });
    });
  }

  function segTable(seg) {
    var rows = (STATE.tiers || []).filter(function (t) { return t.segment === seg; }).sort(function (a, b) { return a.level - b.level; });
    var body = rows.map(function (r) {
      var rng = r.max_sales == null ? grp(r.min_sales) + " فأكثر" : grp(r.min_sales) + " - " + grp(r.max_sales);
      return "<tr><td>مستوى " + AR(r.level) + "</td><td>" + pct(r.rate, seg) + '</td><td class="rng">' + rng + "</td></tr>";
    }).join("");
    return '<div class="lzc-secttl">' + (seg === "retail" ? "مستويات التجزئة" : "مستويات الجملة") + "</div>" +
      '<table class="lzc-tbl"><thead><tr><th>المستوى</th><th>العمولة</th><th>نطاق المبيعات (ر)</th></tr></thead><tbody>' + body + "</tbody></table>";
  }
  function viewSystem() {
    return '<div class="lzc-save" style="border-style:solid;border-color:#cfe2d6;background:#eef5f0;color:#234a30;margin-bottom:14px;">' +
      "كل ما زادت مبيعاتك التراكمية انخفضت عمولتك. لكل بائع عدّادان مستقلان تماماً: تجزئة وجملة. النسبة تُحسب من العدّاد قبل إضافة العملية، ولا يُحتسب إلا الطلبات المكتملة.</div>" +
      segTable("retail") + segTable("wholesale");
  }

  function loadMine(ov) {
    if (!STATE.uid) { ov.querySelector(".lzc-bd").innerHTML = '<div class="lzc-empty">سجّل الدخول لعرض عمولاتك.</div>'; return; }
    SB.from("orders").select("order_no,segment,commission_rate_applied,commission_amount,commission_state,goods_subtotal,reversed_amount,created_at")
      .eq("seller_vendor_id", STATE.uid).not("commission_amount", "is", null)
      .order("created_at", { ascending: false }).then(function (r) {
        if (STATE.tab !== "mine") return;
        var bd = ov.querySelector(".lzc-bd");
        var rows = r.data || [];
        if (!rows.length) { bd.innerHTML = '<div class="lzc-empty">لا توجد عمولات محتسبة بعد.</div>'; return; }
        bd.innerHTML = rows.map(function (o) {
          var rev = o.commission_state === "reversed" || o.commission_state === "partially_reversed";
          return '<div class="lzc-ord"><div class="top"><span>طلب #' + o.order_no + '</span><span class="amt">− ' + money2(o.commission_amount) + ' ر</span></div>' +
            '<div class="chips"><span>' + (SEG_AR[o.segment] || o.segment || "—") + "</span><span>النسبة " + pct(o.commission_rate_applied, o.segment) +
            "</span><span>الأساس " + money2(o.goods_subtotal) + " ر</span></div>" +
            (rev ? '<div class="rev">' + (o.commission_state === "reversed" ? "أُعيدت كاملة" : "أُعيد جزء") + " (" + money2(o.reversed_amount) + " ر)</div>" : "") +
            "</div>";
        }).join("");
      });
  }

  // ---------- boot ----------
  function boot() {
    SB = window.LOZI_SB;
    if (!SB) return;
    injectCss();
    Promise.all([loadProfile(), loadTiers()]).then(renderChip);
    if (SB.auth && SB.auth.onAuthStateChange) {
      SB.auth.onAuthStateChange(function () {
        Promise.all([loadProfile(), loadTiers()]).then(renderChip);
      });
    }
  }
  function waitSB(n) {
    if (window.LOZI_SB) { boot(); return; }
    if (n > 100) return;
    setTimeout(function () { waitSB(n + 1); }, 100);
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", function () { waitSB(0); });
  else waitSB(0);
})();

</script>
