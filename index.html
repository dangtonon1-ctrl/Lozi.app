    </div>}const TERMS_AR={intro:["مرحباً بكم في تطبيق لوزي. تعد هذه الشروط والأحكام بمثابة اتفاقية قانونية ملزمة بين إدارة تطبيق «لوزي» (المشار إليها بـ «الإدارة» أو «التطبيق» أو «مجموعة لوزي») وبين أي شخص يقوم باستخدام التطبيق أو التسجيل فيه (المشار إليه بـ «المستخدم» سواء كان عميلاً، تاجر تجزئة، تاجر جملة، أو مزارعاً).","استخدامك للتطبيق أو تسجيلك فيه يعني موافقتك الكاملة والخالية من الجهالة على هذه الشروط، وإذا كنت لا توافق عليها، يرجى عدم استخدام التطبيق."],sections:[{n:"1",h:"شروط عامة ونطاق الخدمة",items:[{lead:"النطاق الجغرافي:",b:"يقدم تطبيق «لوزي» خدماته حالياً داخل النطاق الجغرافي لـ «العاصمة صنعاء» فقط. ولا يتحمل التطبيق مسؤولية أي طلبات أو شحنات خارج هذا النطاق."},{lead:"آلية الدفع:",b:"وسيلة الدفع المعتمدة في التطبيق لخدمات التجزئة والتوفير هي الدفع عند الاستلام نقداً (COD) فقط."},{lead:"التعديل والتحديث:",b:"تحتفظ إدارة التطبيق بالحق المطلق في تعديل أو تحديث هذه الشروط والأحكام في أي وقت، وتصبح التعديلات سارية وفورية بمجرد نشرها على التطبيق."}]},{n:"2",h:"أحكام وشروط خاصة بالعملاء (المشترين)",items:[{lead:"دقة البيانات ومسؤوليتها:",b:"يلتزم العميل بتقديم معلومات صحيحة ودقيقة عند التسجيل (رقم الهاتف للتفعيل عبر واتساب، والموقع الجغرافي الدقيق عبر GPS)، ويتحمل العميل وحده مسؤولية أي خطأ في العناوين ينتج عنه تأخر أو إلغاء الطلب."},{lead:"سياسة الطلبات المتعددة:",b:"نظراً لأن لكل متجر سلة مستقلة، فإن اختيار منتجات من متاجر متعددة سينتج عنه إنشاء طلبات منفصلة تلقائياً، ويتحمل العميل رسوم التوصيل الخاصة بكل متجر على حدة."},{lead:"إلغاء الطلب:",b:"يحق للعميل إلغاء الطلب فقط قبل البدء في مرحلة التجهيز من قبل المتجر أو الإدارة. بمجرد تحول حالة الطلب في النظام إلى «قيد التجهيز» أو «قيد التوصيل»، لا يمكن إلغاؤه بأي حال من الأحوال."},{tag:"🔄",lead:"سياسة الإرجاع (خلال 24 ساعة):",b:"يحق للعميل طلب إرجاع مشترياته خلال 24 ساعة فقط من وقت استلام الطلب، وذلك في حال كانت البضاعة تالفة، أو ناقصة الوزن الصافي، أو مختلفة تماماً عن الصور والمواصفات المعروضة في التطبيق. ولا يحق له المطالبة بالإرجاع أو استرداد الأموال نهائياً بعد مرور 24 ساعة على الاستلام."},{tag:"🚨",lead:"شرط الحظر الصارم وعقوبة التلاعب:",b:"يُحظر تماماً على العميل إغلاق هاتفه، أو تجاهل اتصالات مندوب التوصيل عمداً عند وصول الطلب لموقعه. وفي حال تكرار هذا التصرف لأكثر من مرتين، سيتم حظر حساب العميل نهائياً وبشكل تلقائي من المنصة."},{tag:"🌰",lead:"إرجاع اللوز ال«شحطي» غير المُفصح عنه:",b:"يُتاح للعميل حق إرجاع منتج اللوز في حال تبيّن أنه من نوع (شحطي) ولم يتم الإفصاح عن ذلك صراحةً وواضحاً ضمن اسم المنتج أو وصفه عند العرض. وفي حال تم الإفصاح عن ذلك بشكل واضح، يُعدّ العميل على علم مسبق بذلك ولا يحق له المطالبة بالإرجاع لهذا السبب. وفي حال ثبت أن الخطأ ناتج عن المزارع (عدم الإفصاح أو إدخال وصف غير صحيح)، فإن المزارع يتحمل تكاليف التوصيل."},{lead:"التقييمات:",b:"يلتزم العميل بكتابة تقييمات صادقة وواقعية للمتاجر والمزارعين. يحظر استخدام الألفاظ النابية أو المسيئة، وللإدارة الحق الكامل في حذف أي تقييم يخالف ذلك دون الرجوع للعميل."}]},{n:"3",h:"أحكام وشروط خاصة بمتاجر التجزئة وجملة المكسرات (التجار)",items:[{tag:"🏅",lead:"خيارات منح «شارة التوثيق»:",b:"لإضفاء الطابع الرسمي وحماية المنصة من الكيانات الوهمية، تتيح إدارة التطبيق لتاجر التجزئة وتاجر الجملة خيارين مستقلين للحصول على «شارة التوثيق» داخل التطبيق:"},{sub:!0,lead:"الخيار الأول (التوثيق المستندي):",b:"قيام التاجر برفع صورة واضحة وصالحة من ترخيص المحل الرسمي، أو سجله التجاري، أو بطاقة عضويته في الغرفة التجارية والصناعية بصنعاء عبر النظام."},{sub:!0,lead:"الخيار الثاني (التوثيق الميداني):",b:"في حال عدم توفر الأوراق الرسمية، يطلب التاجر «نزولاً ميدانياً»، وتتولى إدارة التطبيق إرسال مندوب لمعاينة المحل على الطبيعة والتحقق من جودة ومطابقة معروضاته للمقاييس المطلوبة قبل تفعيل الشارة."},{lead:"صلاحيات النشر وحظر التعدي:",b:"يُسمح للمتجر بنشر منتجات المكسرات داخل صفحته الخاصة فقط. يُمنع منعاً باتاً على المتاجر النشر في أقسام «اللوز البلدي» أو «الزبيب» المخصصة حصرياً للمزارعين، ويحق للإدارة حذف أي منشور مخالف فوراً."},{lead:"الالتزام بالأسعار والعروض:",b:"يتعهد المتجر بتقديم أسعار حقيقية ومحدثة، وفي حال إنشاء «عروض مخفضة»، يجب إرسالها للإدارة مسبقاً للموافقة عليها للتأكد من جديتها."},{tag:"🛵",lead:"حصرية اختيار الموصل وإخلاء المسؤولية المطلقة:",b:"يقر ويلتزم متجر التجزئة التزاماً قاطعاً بأن اختيار، وتعيين، والتعاقد مع مناديب التوصيل أو السائقين أو الناقلين هو مسؤولية حصرية ومباشرة على عاتق المتجر وحده، ولا تتدخل إدارة تطبيق «لوزي» في اختيار الموصلين بأي شكل من الأشكال. وبناءً على ذلك، فإن عملية توصيل بضائع التجزئة للعملاء تقع على مسؤولية المتجر المالية والمدنية الكاملة، ويضمن المتجر سلامة البضاعة من أي تلف، ضياع، أو نقص أثناء الطريق. وفي حال حدوث أي ضرر للبضاعة، أو وقوع أي نزاع أو خلاف مع المندوب المختار من قبل المتجر، أو ارتكاب المندوب لأي خطأ تشغيلي أو قانوني، يتحمل المتجر الخسارة والمسؤولية الكاملة بمفرده دون أدنى مسؤولية، أو التزام مالي، أو تضامن قانوني من قِبل تطبيق لوزي أو إدارته."},{tag:"🔒",lead:"قطعية تسعيرة التوصيل ومنع الابتزاز:",b:"يلتزم المتجر برمجياً وقانونياً بتسعيرة التوصيل الظاهرة والمعتمدة في التطبيق وقت تأكيد الطلب من قبل العميل. ويُحظر على مندوب التوصيل التابع للمتجر مطالبة العميل بأي مبالغ إضافية أو بقشيش أو تعديل في قيمة المشوار تحت أي مسمى (مثل بعد المسافة، الازدحام المروري، أو أزمات المشتقات النفطية). وفي حال خالف المندوب ذلك وطالب بزيادة مالية، يحق للعميل رفض استلام البضاعة فوراً، ويتحمل المتجر كلفة مشوار سائقه كاملاً ونفقة الرحلة، مع حق الإدارة في اتخاذ عقوبات تصل لحظر الحساب."},{tag:"⚠️",lead:"تحمل تكاليف التوصيل المرتجعة للعميل:",b:"يتحمل المتجر تكاليف ورسوم التوصيل بالكامل لسائقه/مندوبه في حال قام العميل بإلغاء طلبه (بعد خروج المندوب)، أو في حال تجاهل العميل اتصال المندوب، أو قام بإغلاق هاتفه وتسبب في إرجاع الطلب."},{tag:"💸",lead:"آلية الإرجاع الإلزامية وعقوبة البضاعة المخالفة:",b:"في حال قبول إدارة التطبيق لبلاغ العميل بالإرجاع خلال الـ 24 ساعة المسموحة (بسبب تلف، أو غش، أو نقص وزن البضاعة)، يلتزم المتجر مجبراً برد كامل المبلغ المالي للعميل، كما يتحمل المتجر منفرداً كلفة إرسال سائقه/مندوبه مجدداً إلى موقع العميل لاستلام البضاعة وإعادة الأموال كاش له، وذلك كإجراء تعويضي للعميل وعقوبة للمتجر على إرسال بضاعة مخالفة."},{tag:"🔒",lead:"الملكية الفكرية والأسماء التجارية:",b:"يتعهد ويضمن المتجر بأن الاسم التجاري، والشعار، والعلامة التي يرفعها على المنصة هي ملك خالص له أو يمتلك ترخيصاً قانونياً باستخدامها. ويتحمل المتجر منفرداً المسؤولية القانونية والقضائية الكاملة في حال وجود أي نزاع على الاسم أو انتحال للشخصية التجارية أو انتهاك للملكية الفكرية. وتحتفظ إدارة «لوزي» بالحق الكامل في إيقاف أو حظر أي متجر فوراً ودون أي تعويض في حال ثبت انتحاله لاسم تاجر آخر."},{tag:"🚫",lead:"حظر التهرب التجاري والبيع الخلفي:",b:"يُمنع منعاً باتاً وقاطعاً على المتاجر محاولة تحويل العملاء خارج المنصة، أو مشاركة أرقام التواصل المباشر (الواتساب أو الاتصال)، أو توزيع كروت المحلات الخاصة بهم داخل شحنات الطلبات بغرض حث العميل على الشراء الخارجي والتهرب من المنصة. وفي حال إثبات ذلك، يحق لإدارة «لوزي» فرض غرامة مالية قاسية، وسحب شارة التوثيق، وحظر حساب المتجر نهائياً."},{tag:"⚖️",lead:"شرط الوزن الصافي (Net Weight):",b:"يتعهد المتجر تعهداً قانونياً قاطعاً بأن جميع الأوزان المعروضة للمنتجات داخل التطبيق هي أوزان صافية وخالصة للمنتج الغذائي نفسه دون احتساب وزن مواد التغليف، أو الأكياس، أو الصناديق الكرتونية. ويُعد أي نقص «غشاً تجارياً وتطفيفاً» يمنح العميل حق الإرجاع الفوري، ويتحمل البائع وحده المسؤولية أمام الجهات المختصة."},{lead:"قسم تجار الجملة:",b:"هذا القسم هو ميزة خاصة وحصرية تظهر للمتاجر فقط للتزود بالبضائع، ويحظر على المتاجر تسريب أسعار الجملة أو مشاركتها مع الجمهور العادي."}]},{n:"4",h:"أحكام وشروط خاصة بالمزارعين",items:[{lead:"حصرية الأقسام:",b:"تمنح المنصة أقسام «اللوز البلدي» و«الزبيب» كحق حصري للمزارعين الحقيقيين فقط."},{lead:"شرط التواجد الجغرافي للبضاعة:",b:"يلتزم المزارع برمجياً وتشغيلياً بأن تكون البضاعة المعروضة للبيع متواجدة داخل نطاق العاصمة صنعاء عند عرضها، لضمان سرعة نقلها وتوصيلها وتفادي تكاليف الشحن الطويل بين المحافظات."},{lead:"سياسة تسعير المنتجات وحق الحذف:",b:"المزارع هو المسؤول الأول عن تحديد سعر منتجاته، ولكن تحتفظ إدارة التطبيق بالحق الكامل في تعطيل أو حذف أي منشور منتج إذا رأت الإدارة أن السعر غير منطقي أو مبالغ فيه مقارنة بأسعار السوق السائدة، مع إرسال تنبيه للمزارع."},{tag:"🌰",lead:"الإفصاح عن اللوز «الشحطي» وحق الإرجاع:",b:"يُتاح للعميل حق إرجاع منتج اللوز في حال تبيّن أنه من نوع (شحطي) ولم يتم الإفصاح عن ذلك صراحةً وواضحاً ضمن اسم المنتج أو وصفه عند العرض. وفي حال تم الإفصاح عن ذلك بشكل واضح، يُعدّ العميل على علم مسبق بذلك ولا يحق له المطالبة بالإرجاع لهذا السبب. وفي حال ثبت أن الخطأ ناتج عن المزارع (عدم الإفصاح أو إدخال وصف غير صحيح)، فإن المزارع يتحمل تكاليف التوصيل."},{tag:"⚖️",lead:"شرط الوزن الصافي والالتزام بالتسعيرة:",b:"ينطبق على المزارعين ما ينطبق على المتاجر بخصوص الالتزام بالوزن الصافي الخالص للمنتج دون التغليف، والالتزام القاطع بتسعيرة التوصيل المعتمدة في النظام وقت الطلب دون المطالبة بأي مبالغ إضافية عند باب العميل."},{tag:"🚫",lead:"حظر التهرب التجاري:",b:"يُحظر تماماً على المزارعين توزيع أرقامهم أو كروت تواصلهم مع المناديب لسرقة عملاء المنصة والبيع من خلف التطبيق، ويُعاقب المخالف بالحظر النهائي والغرامة."},{tag:"📦",lead:"التوصيل الخاص بالمزارعين وإخلاء المسؤولية:",b:"المزارع هو المسؤول الأول والأخير عن تأمين وتدبير مندوب لتوصيل بضاعته إلى العميل في صنعاء على نفقته ومسؤوليته الكاملة. وفي حال تعذر على المزارع ذلك، وتدخلت إدارة «لوزي» لتوفير مندوب من طرفها كخدمة تسهيلية، فإن هذا المندوب يُعد وكيلاً عن المزارع في هذه الرحلة. وتخلي إدارة «لوزي» مسؤوليتها القانونية والمالية التامة عن أي تلف، نقص، ضياع للبضاعة أو الكاش أثناء الطريق، كما يتحمل المزارع وحده كلفة المشوار المرتجع وإعادة الأموال للعميل إذا تبين أن بضاعته تالفة أو مخالفة خلال الـ 24 ساعة الأولى."}]},{n:"5",h:"قسم تجار الجملة وإخلاء المسؤولية التامة",items:[{lead:"نطاق الخدمة:",b:"يقتصر دور قسم «تجار الجملة» (المخفي عن الجمهور) على عرض أسعار الجملة وربط المتاجر بتجار الجملة لإتمام الطلب فيما بينهم فقط، بمثابة لوحة معلومات وعرض، دون أي تدخل من المنصة في النقل أو الشحن أو التحصيل."},{tag:"🚚",lead:"حظر التدخل ومسؤولية الناقل الكاملة:",b:"يقر ويلتزم تاجر الجملة والمحل المشتري بأن إدارة تطبيق «لوزي» لا تتدخل بأي شكل من الأشكال في عمليات نقل، أو شحن، أو تنسيق طلبات الجملة. ويعد اختيار الموصل، أو السائق، أو جهة النقل والناقل مسؤولية حصرية وكاملة ومباشرة على عاتق تجار الجملة والمحلات (خارج نطاق المنصة التقنية). وبناءً عليه، يقع عبء وتكاليف ومخاطر الشحن والتوصيل، وضمان سلامة البضاعة من أي تلف، أو نقص، أو ضياع أثناء الطريق على عاتق أطراف عملية النقل المختارين من قِبلهم، دون أدنى مسؤولية أو تبعة تضامنية على التطبيق."},{tag:"🔒",lead:"الحماية من الاحتيال وتبرئة الذمة من المندوبين الوهميين:",b:"تخلي إدارة تطبيق «لوزي» مسؤوليتها القانونية والمالية التامة والمطلقة في حال تعرض تاجر الجملة لأي عملية تلاعب أو احتيال. وإذا تقدم إلى تاجر الجملة أي سائق، أو مندوب توصيل، أو أي شخص يدّعي أو يزعم زوراً أنه مرسل من قِبل إدارة تطبيق «لوزي» أو «مجموعة لوزي»، وقام بطلب بضائع، أو سحب أموال، أو طلب مبالغ مالية تحت أي مسمى؛ فإن إدارة التطبيق لا تتحمل أدنى مسؤولية عن تصرفاته. ويتحمل تاجر الجملة وحده كامل المسؤولية المدنية والجنائية الناتجة عن تسليم أمواله أو بضائعه لأي شخص دون التحقق الرسمي والاتصال المباشر بإدارة المنصة لاعتماد الهوية، ويُعد تسليمه للبضائع أو الكاش تقصيراً منه يسقط معه حقه في أي مطالبة مستقبلية."},{tag:"❌",lead:"إخلاء المسؤولية المالية للجملة والديون:",b:"لا يحق لتاجر الجملة نهائياً مطالبة «مجموعة لوزي» بقيمة أي بضاعة تم توصيلها لأحد المتاجر ولم يقم المتجر بدفع ثمنها، سواء كان ذلك بسبب إهمال مندوب التوصيل التابع لتاجر الجملة في تحصيل المبلغ، أو بسبب امتناع المتجر عن السداد أو أي سبب آخر. العلاقة المالية والتحصيل والديون هي مسؤولية مباشرة وحصرية بين تاجر الجملة والمتجر المشتري خارج نطاق المنصة."}]},{n:"6",h:"قسم التوفير والاشتراكات (الملكية الفكرية والحماية التجارية)",items:[{lead:"ملكية القسم:",b:"«قسم التوفير» هو قسم تجاري وحصري مملوك بالكامل لإدارة تطبيق «لوزي» (مجموعة لوزي)، ولا يحق لأي متجر أو مزارع خارجي عرض منتجاته فيه."},{lead:"رسوم الاشتراك والتفعيل:",b:"قيمة الاشتراك السنوي في قسم التوفير هي 500 ريال يمني سنوياً (أو ما يعادلها بحسب ما تحدده الإدارة). يتم تفعيل الاشتراك يدوياً بعد قيام العميل برفع صورة واضحة لسند دفع الرسوم المعتمد."},{tag:"🚫",lead:"حظر الاستغلال التجاري وقيد الكميات:",b:"منتجات قسم التوفير مخصصة للاستهلاك الشخصي والمنزلي للعملاء الحقيقيين فقط. ويُمنع منعاً باتاً استخدام القسم لأغراض تجارية، أو إعادة البيع، أو تصريف البضائع للمحلات. وتحتفظ إدارة «لوزي» بالحق المطلق في تحديد حد أقصى للكميات المتاحة للشراء لكل عميل برمجياً، كما يحق للإدارة إلغاء أي طلبية وإيقاف وحظر حساب المشتري نهائياً ودون رد رسوم الاشتراك إذا تبين أنه «تاجر» أو يقوم بشراء الكميات بغرض إعادة البيع والمنافسة غير المشروعة."},{lead:"انتهاء الاشتراك:",b:"عند انتهاء مدة الاشتراك السنوي، يحق للتطبيق حجب ميزة الشراء والوصول لقسم التوفير فوراً، وتظل الأسعار المخفضة ظاهرة فقط كعرض تشجيعي للمستخدم حتى يقوم بالتجديد."}]},{n:"7",h:"نظام البلاغات والقرارات الإدارية القاطعة",items:[{lead:"آلية بلاغات الإرجاع وشكاوى الجودة:",b:"لتقديم طلب إرجاع خلال الـ 24 ساعة المسموحة، يجب على العميل رفع بلاغ رسمي موجه للإدارة عبر التطبيق، يلتزم فيه بـ: رفع صور واضحة وقاطعة تثبت تلف البضاعة أو نقص وزنها أو اختلافها، وكتابة وصف تفصيلي للمشكلة، وتحديد اسم المتجر أو المزارع المشترى منه."},{lead:"السرية والاطلاع:",b:"يُرسل البلاغ للإدارة وللمتجر معاً بشكل سري ولا يظهر للعامة. يرى المتجر البلاغ بالكامل وتفاصيله لمراجعة جودة عمله، لكن لا يمكنه الرد عليه أو حذفه داخل التطبيق."},{lead:"القرار النهائي الصارم:",b:"لإدارة التطبيق الصلاحية المطلقة والكاملة في اتخاذ القرار النهائي بشأن قبول طلب الإرجاع أو رفضه، أو التعامل مع أي مخالفة للشروط (بما يشمل إيقاف وحظر حسابات المتاجر، المزارعين، أو العملاء). جميع قرارات الإدارة نهائية وقاطعة ولا تقبل الاستئناف، أو المراجعة، أو الطعن بأي شكل من الأشكال قضائياً أو إدارياً."}]},{n:"8",h:"مرجعية الغرفة التجارية والتحكيم",items:[{tag:"⚖️",lead:"الغرفة التجارية كجهة تحكيم حصرية:",b:"في حال حدوث أي نزاع تجاري أو قانوني بين المتجر (تجزئة أو جملة) أو المزارع وبين إدارة التطبيق، ويتعذر حله ودياً، يتعهد الطرفان التزاماً قاطعاً وقبل اللجوء إلى القضاء والجهات الحكومية بإحالة النزاع رسمياً إلى «مركز التحكيم في الغرفة التجارية والصناعية بصنعاء» للفصل فيه وفقاً لأعراف سوق المكسرات واللوز والزبيب المعتمدة في أمانة العاصمة. وتظل كافة قرارات إدارة «لوزي» الإدارية (من حظر حسابات، أو إلغاء توثيق، أو حذف منتجات) سارية ونافذة وفورية طوال فترة التحكيم وحتى صدور قرار رسمي من الغرفة."}]},{n:"9",h:"مطابقة الصور للواقع وحظر التضليل البصري (ضمان الجودة)",items:[{tag:"📸",lead:"شرط حقيقية ومطابقة الصور:",b:"يتعهد ويقر المتجر والمزارع التزاماً قاطعاً بأن جميع الصور والوسائط المرئية المرفوعة للمنتجات داخل التطبيق هي صور حقيقية ومطابقة بنسبة 100% للمنتج الفعلي الذي سيتم شحنه وتوصيله للعميل من حيث: (النوع، المنشأ كاللوز البلدي أو الخارجي، الحجم، اللون، ودرجة الجودة ونظافة المنتج). ويُحظر تماماً استخدام صور عامة من الإنترنت أو صور مضللة تفوق جودة المنتج الحقيقي المعروض."},{tag:"🚨",lead:"عقوبة الغش والتضليل البصري:",b:"في حال تبين لإدارة التطبيق (بناءً على بلاغ مصور من العميل ومقارنته بالصورة المعروضة في المنصة) أن المنتج المرسل أقل جودة، أو مختلف النوع والمنشأ، أو مجرد تضليل بصري؛ يُصنف هذا التصرف قانونياً وتشغيلياً كـ «تزوير وغش تجاري معتمد»."},{lead:"التبعات القانونية والإدارية:",b:"يمنح هذا المخالفُ العميلَ الحقَ المطلق في رفض الاستلام أو إرجاع البضاعة واسترداد ماله كاملاً كاش، ويتحمل البائع وحده كلفة مشوار المندوب ذهاباً وإياباً. وتحتفظ إدارة «لوزي» بالحق الكامل والفوري في شطب المنتج المخالف، وفرض غرامة مالية على الحساب، وفي حال التكرار يتم حظر حساب المتجر أو المزارع نهائياً من المنصة مع إخلاء مسؤولية التطبيق أمام جهات الرقابة وحماية المستهلك."}]},{n:"10",h:"سلامة التخزين وجودة المذاق",items:[{tag:"🛡️",lead:"تعهد جودة المنتج وطزاجته:",b:"يتعهد المتجر والمزارع بأن جميع المنتجات المعروضة هي بضائع طازجة، سليمة، وخالية تماماً من الرطوبة، أو السوس، أو طعم «الزرنخة» الناتج عن سوء أو طول فترة التخزين."},{lead:"حق الإرجاع عند ظهور العيب:",b:"إذا تبين للعميل بعد فتح المنتج وتذوقه خلال الـ 24 ساعة الأولى وجود هذا العيب، يُعتبر المنتج تالفاً، ويحق للعميل إرجاعه فوراً واستعادة ماله، ويتحمل البائع المسؤولية الكاملة عن تعويض العميل وتكاليف المندوب، مع حق الإدارة في إنذار البائع أو حظره."}]},{n:"11",h:"حظر التنازل عن الحساب أو التصرف به",items:[{tag:"🪪",lead:"حصرية ملكية الحساب الموثق:",b:"تعتبر حسابات المتاجر والمزارعين في تطبيق «لوزي»، وبخاصة الحسابات الموثقة، حسابات شخصية وحصرية لأصحابها القانونيين الذين تم التحقق منهم مستندياً أو ميدانياً."},{lead:"حظر البيع أو النقل دون موافقة:",b:"يُمنع منعاً باتاً وقاطعاً بيع الحساب، أو تأجيره، أو التنازل عنه، أو نقل ملكيته للغير دون أخذ موافقة خطية مسبقة من إدارة التطبيق. وفي حال اكتشاف أي عملية نقل ملكية أو تصرف بالحساب من
